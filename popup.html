<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Pylon Messages</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div id="app">
      <!-- ─── Header ─── -->
      <header class="header">
        <div class="header-left">
          <svg class="logo-icon" viewBox="0 0 24 24" width="18" height="18">
            <path
              d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              fill="none"
            />
          </svg>
          <h1>Pylon</h1>
        </div>
        <button id="refresh-btn" class="icon-btn" title="Refresh messages">
          <svg viewBox="0 0 24 24" width="15" height="15">
            <path d="M23 4v6h-6M1 20v-6h6" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none" />
            <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none" />
          </svg>
        </button>
      </header>

      <!-- ─── Token status bar (visible when a token is active) ─── -->
      <div id="token-bar" class="token-bar hidden"></div>

      <!-- ─── Token input panel (visible when no token is set) ─── -->
      <section class="panel hidden" id="token-panel">
        <label class="panel-label">
          <svg viewBox="0 0 24 24" width="11" height="11">
            <rect x="3" y="11" width="18" height="11" rx="2" stroke="currentColor" stroke-width="2" fill="none" />
            <path d="M7 11V7a5 5 0 0110 0v4" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" />
          </svg>
          Bearer Token
        </label>
        <div class="input-row">
          <input type="password" id="token-input" placeholder="Paste your API token…" autocomplete="off" spellcheck="false" />
          <button id="token-save" class="btn btn-accent">Save</button>
        </div>
        <p class="panel-meta">Saved to session · cleared when browser closes</p>
      </section>

      <!-- ─── Conversation ID ─── -->
      <section class="panel">
        <label class="panel-label">
          <svg viewBox="0 0 24 24" width="11" height="11">
            <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
          Conversation ID
        </label>
        <div class="input-row">
          <input type="text" id="conv-input" placeholder="Auto-detected from URL…" autocomplete="off" spellcheck="false" />
          <button id="fetch-btn" class="btn btn-accent">Fetch</button>
        </div>
        <p class="panel-meta" id="conv-meta">Navigate to a Pylon issue to auto-detect</p>
      </section>

      <!-- ─── Status (loading / error) ─── -->
      <div id="status" class="status hidden"></div>

      <!-- ─── Message list ─── -->
      <div id="messages" class="messages"></div>

      <!-- ─── Raw JSON toggle ─── -->
      <div id="raw-section" class="raw-section hidden">
        <button id="raw-toggle" class="btn btn-ghost">Show raw JSON</button>
        <pre id="raw-output" class="raw-output hidden"></pre>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
